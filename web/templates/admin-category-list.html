{{range .}}
<div class="flex items-center justify-between p-4 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors {{if not .IsActive}}opacity-60 bg-gray-100{{end}}" data-category-id="{{.ID}}">
  <div class="flex items-center gap-4 flex-1">
    <div class="flex-1">
      <div class="flex items-center gap-2">
        <h3 class="text-lg font-semibold text-gray-800">{{.Name}}</h3>
        {{if .AllowsCompatibility}}
          <span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full">Permite compatibilidade</span>
        {{end}}
        {{if not .IsActive}}
          <span class="bg-gray-400 text-white text-xs px-2 py-1 rounded-full">Inativo</span>
        {{end}}
      </div>
      <div class="text-xs text-gray-500 mt-1">
        <span>Slug: {{.Slug}}</span>
      </div>
    </div>
  </div>

  <div class="flex items-center gap-2">
    <button
      type="button"
      hx-get="/admin/categories/edit/{{.ID}}"
      hx-target="body"
      hx-swap="beforeend"
      class="bg-blue-600 text-white px-3 py-2 rounded hover:bg-blue-700 transition-colors text-sm"
      title="Editar categoria">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
      </svg>
    </button>

    <button
      type="button"
      hx-put="/api/admin/categories/{{.ID}}/toggle"
      hx-confirm="Tem certeza que deseja {{if .IsActive}}desativar{{else}}reativar{{end}} a categoria '{{.Name}}'?"
      hx-swap="none"
      class="{{if .IsActive}}bg-red-600 hover:bg-red-700{{else}}bg-green-600 hover:bg-green-700{{end}} text-white px-3 py-2 rounded transition-colors text-sm"
      title="{{if .IsActive}}Desativar{{else}}Reativar{{end}} categoria">
      {{if .IsActive}}
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      {{else}}
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      {{end}}
    </button>
  </div>
</div>
{{else}}
<div class="text-center py-8 text-gray-500">
  <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto mb-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
  </svg>
  <p class="text-lg font-medium">Nenhuma categoria cadastrada</p>
  <p class="text-sm">Adicione categorias usando o botão acima.</p>
</div>
{{end}}
