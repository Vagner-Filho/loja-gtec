{{range .}}
<div data-banner-id="{{.ID}}" class="flex items-center gap-4 p-4 bg-gray-50 rounded-lg border border-gray-200">
  <!-- Reorder Controls -->
  <div class="flex flex-col gap-1">
    <button 
      type="button"
      onclick="moveBanner({{.ID}}, 'up')"
      class="p-1 text-gray-500 hover:text-blue-600 hover:bg-blue-100 rounded transition-colors"
      title="Mover para cima">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" />
      </svg>
    </button>
    <span class="text-xs text-gray-400 text-center">{{.DisplayOrder}}</span>
    <button 
      type="button"
      onclick="moveBanner({{.ID}}, 'down')"
      class="p-1 text-gray-500 hover:text-blue-600 hover:bg-blue-100 rounded transition-colors"
      title="Mover para baixo">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
      </svg>
    </button>
  </div>

  <!-- Banner Image -->
  <div class="flex-shrink-0">
    <img src="{{.ImagePath}}" alt="{{.Title}}" class="w-32 h-20 object-cover rounded border border-gray-300">
  </div>

  <!-- Banner Info -->
  <div class="flex-grow min-w-0">
    <h3 class="text-sm font-medium text-gray-800 truncate">{{.Title}}</h3>
    <p class="text-xs text-gray-500 mt-1">Ordem: {{.DisplayOrder}}</p>
    {{if .LinkURL}}
      <p class="text-xs text-blue-600 truncate mt-1">{{.LinkURL}}</p>
    {{end}}
  </div>

  <!-- Status Toggle -->
  <div class="flex items-center gap-2">
    <span class="text-sm text-gray-600">{{if .IsActive}}Ativo{{else}}Inativo{{end}}</span>
    <button 
      type="button"
      hx-put="/api/admin/banners/{{.ID}}/toggle"
      hx-swap="none"
      class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 {{if .IsActive}}bg-green-600{{else}}bg-gray-200{{end}}">
      <span class="sr-only">Toggle status</span>
      <span class="inline-block h-4 w-4 transform rounded-full bg-white transition {{if .IsActive}}translate-x-6{{else}}translate-x-1{{end}}"></span>
    </button>
  </div>

  <!-- Delete Button -->
  <button 
    type="button"
    hx-delete="/api/admin/banners/{{.ID}}"
    hx-confirm="Tem certeza que deseja excluir este banner?"
    hx-swap="none"
    class="p-2 text-red-600 hover:bg-red-100 rounded-lg transition-colors"
    title="Excluir banner">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
    </svg>
  </button>
</div>
{{else}}
<div class="text-center py-8 text-gray-500">
  <p class="text-lg">Nenhum banner cadastrado.</p>
  <p class="text-sm mt-2">Adicione seu primeiro banner usando o formulário acima.</p>
</div>
{{end}}
